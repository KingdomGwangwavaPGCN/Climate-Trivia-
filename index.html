  <script>
  const BANK = [
  {question:"What is the primary greenhouse gas emitted by human activities?",options:["Carbon Dioxide CO2","Oxygen","Nitrogen","Argon"],correctIndex:0,explanation:"CO2 from fossil fuels and deforestation is the principal driver of anthropogenic climate change.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What does IPCC stand for?",options:["International Panel on Climate Change","Intergovernmental Panel on Climate Change","International Policy on Carbon Control","Intergovernmental Programme on Carbon Capture"],correctIndex:1,explanation:"The IPCC established in 1988 is the UN body for assessing climate science.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the Paris Agreement temperature target?",options:["3C above pre-industrial","1.5-2C above pre-industrial","0.5C above pre-industrial","4C above pre-industrial"],correctIndex:1,explanation:"The Paris Agreement aims to limit warming to well below 2C pursuing efforts towards 1.5C.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"Which African region is most vulnerable to climate-induced drought?",options:["Central Africa","Southern and East Africa","North Africa only","West Africa only"],correctIndex:1,explanation:"Southern and East Africa face severe drought risks including Zimbabwe threatening food and water security.",category:"Climate Science",sdg:"SDG 13",ring:"zimbabwe"},
  {question:"What warming is projected with full NDC implementation per UNEP EGR 2025?",options:["1.5C","1.8C","2.3-2.5C","3.5C"],correctIndex:2,explanation:"The UNEP EGR 2025 found that even with full NDC implementation warming projections stand at 2.3-2.5C.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What emissions reduction is needed by 2035 for the 1.5C pathway?",options:["20%","35%","55%","75%"],correctIndex:2,explanation:"The UNEP Emissions Gap Report 2025 requires 55% reductions below 2019 levels by 2035.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is climate feedback?",options:["Government policy response","A process that amplifies or reduces warming effects","A financial carbon mechanism","Media reporting on climate"],correctIndex:1,explanation:"Climate feedbacks either amplify or dampen warming effects in the Earth system.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is Africa's share of global greenhouse gas emissions?",options:["Less than 4%","15%","25%","35%"],correctIndex:0,explanation:"Africa contributes approximately 3-4% of global emissions yet bears some of the severest climate impacts.",category:"Climate Science",sdg:"SDG 13",ring:"africa"},
  {question:"When is the IPCC AR7 Synthesis Report expected?",options:["2026","2027","2029","2031"],correctIndex:2,explanation:"IPCC AR7 Working Group outlines were agreed February 2025 and the Synthesis Report is expected by late 2029.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the greenhouse effect?",options:["Cooling of Earth surface","Trapping of heat by atmospheric gases","Reflection of sunlight by clouds","Absorption of UV rays"],correctIndex:1,explanation:"The greenhouse effect occurs when atmospheric gases trap heat from Earth's surface warming the planet.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"Which gas has the highest global warming potential over 100 years?",options:["Carbon dioxide","Methane","Nitrous oxide","Sulphur hexafluoride"],correctIndex:3,explanation:"Sulphur hexafluoride has a GWP of about 23500 over 100 years far exceeding other greenhouse gases.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the current CO2 concentration as of 2025?",options:["280 ppm","350 ppm","425 ppm","500 ppm"],correctIndex:2,explanation:"CO2 concentrations surpassed 425 ppm in 2025 far above the pre-industrial level of 280 ppm.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What does albedo mean in climate science?",options:["Heat absorption by oceans","Reflectivity of a surface","Speed of wind","Depth of permafrost"],correctIndex:1,explanation:"Albedo measures how much solar radiation a surface reflects. Ice has high albedo and dark surfaces have low albedo.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the main cause of sea level rise?",options:["Increased rainfall","Thermal expansion of oceans and melting ice","Tidal changes","Volcanic eruptions"],correctIndex:1,explanation:"Sea level rises due to thermal expansion of warming oceans and melting of glaciers and ice sheets.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is permafrost?",options:["Permanent sea ice","Ground that remains frozen for at least two years","Frozen mountain peaks","Glacial ice sheets"],correctIndex:1,explanation:"Permafrost is ground that stays frozen for at least two consecutive years and its thaw releases stored carbon.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"How much has global average temperature risen since pre-industrial times?",options:["0.5C","1.1-1.2C","2.0C","3.0C"],correctIndex:1,explanation:"Global average temperature has risen approximately 1.1-1.2C above pre-industrial levels as of the mid-2020s.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is an El Nino event?",options:["A cold ocean current in the Pacific","A warming of surface waters in the central and eastern Pacific","A hurricane in the Atlantic","A drought in the Sahel"],correctIndex:1,explanation:"El Nino involves warming of Pacific Ocean surface waters causing widespread climate disruptions including droughts in southern Africa.",category:"Climate Science",sdg:"SDG 13",ring:"sadc"},
  {question:"What is the carbon cycle?",options:["The rotation of the Earth","Movement of carbon through atmosphere land ocean and living things","The life cycle of coal","Carbon pricing mechanisms"],correctIndex:1,explanation:"The carbon cycle describes how carbon moves between the atmosphere biosphere hydrosphere and lithosphere.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"Which sector is the largest global emitter of greenhouse gases?",options:["Agriculture","Transport","Energy production and use","Industry"],correctIndex:2,explanation:"Energy production and use burning fossil fuels for electricity and heat accounts for the largest share of global emissions.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is ocean acidification?",options:["Saltier oceans from evaporation","Lowering of ocean pH due to absorbed CO2","Warming of deep ocean currents","Pollution from industrial waste"],correctIndex:1,explanation:"Oceans absorb CO2 forming carbonic acid and lowering pH threatening marine ecosystems including coral reefs.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is a climate tipping point?",options:["Moment a country adopts a climate law","A threshold beyond which climate changes become self-reinforcing","The peak of a heat wave","A financial trigger for climate funding"],correctIndex:1,explanation:"Climate tipping points are thresholds where small changes trigger larger potentially irreversible shifts in Earth systems.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What percentage of freshwater is held in glaciers and ice sheets?",options:["10%","45%","69%","90%"],correctIndex:2,explanation:"About 69% of the world freshwater is locked in glaciers and ice sheets making their melting a critical water security threat.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is methane GWP compared to CO2 over 20 years?",options:["5 times","20 times","80 times","200 times"],correctIndex:2,explanation:"Methane is approximately 80 times more potent than CO2 over a 20-year period making its reduction urgent.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What causes the urban heat island effect?",options:["Urban parks and gardens","Dark surfaces buildings and reduced vegetation in cities","City lighting at night","Population density"],correctIndex:1,explanation:"Cities absorb and retain more heat due to dark surfaces concrete and reduced vegetation compared to surrounding areas.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is a climate model?",options:["A physical scale model of Earth","A mathematical simulation of Earths climate system","A weather forecast tool","A satellite image processor"],correctIndex:1,explanation:"Climate models are mathematical representations of Earths atmosphere oceans and land used to project future climate conditions.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the difference between weather and climate?",options:["There is no difference","Weather is short-term atmospheric conditions and climate is long-term patterns","Climate is daily and weather is yearly","Weather only occurs in tropical regions"],correctIndex:1,explanation:"Weather describes short-term atmospheric conditions and climate describes long-term patterns over 30 or more years.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the ozone layer?",options:["A layer of CO2 in the atmosphere","A layer of ozone in the stratosphere protecting Earth from UV radiation","The boundary between troposphere and stratosphere","A cloud formation type"],correctIndex:1,explanation:"The ozone layer in the stratosphere absorbs harmful ultraviolet radiation from the sun protecting life on Earth.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"Which greenhouse gas is most associated with livestock and rice paddies?",options:["CO2","Methane","Nitrous oxide","Water vapour"],correctIndex:1,explanation:"Methane is emitted from rice paddies and livestock making agriculture a significant emissions source.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the thermohaline circulation?",options:["Seasonal wind patterns","Global ocean current system driven by temperature and salinity differences","Tidal movements","Coastal wave patterns"],correctIndex:1,explanation:"The thermohaline circulation is a global ocean conveyor belt driven by temperature and salinity differences regulating global climate.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"How does deforestation contribute to climate change?",options:["It has no effect","It releases stored carbon and reduces carbon absorption","It increases rainfall","It cools the atmosphere"],correctIndex:1,explanation:"Deforestation releases stored carbon and removes trees that absorb CO2 contributing to increased atmospheric greenhouse gases.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the stratosphere?",options:["The lowest layer of the atmosphere","The second layer of the atmosphere containing the ozone layer","The outermost layer of the atmosphere","The layer where weather occurs"],correctIndex:1,explanation:"The stratosphere is the second atmospheric layer from 12 to 50 km altitude containing the ozone layer.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is radiative forcing?",options:["Solar energy collection","The change in energy flux caused by climate drivers","Wind energy measurement","Ocean current strength"],correctIndex:1,explanation:"Radiative forcing measures the change in energy flux in the atmosphere caused by natural or anthropogenic factors.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What record was set for global ocean temperatures in 2024?",options:["Coolest on record","Warmest on record for the third consecutive year","Average temperatures","No significant change"],correctIndex:1,explanation:"2024 marked the third consecutive year of record-breaking global ocean temperatures accelerating ice melt and sea level rise.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the cryosphere?",options:["The study of ice cream production","All frozen water on Earth including ice sheets glaciers and permafrost","Underground water reserves","Frozen food technology"],correctIndex:1,explanation:"The cryosphere encompasses all frozen water components of Earths climate system playing a key role in regulating global climate.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What does RCP stand for in climate projections?",options:["Regional Climate Pathway","Representative Concentration Pathway","Reduced Carbon Protocol","Renewable Carbon Programme"],correctIndex:1,explanation:"RCP describes different greenhouse gas concentration trajectories used in climate modelling.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is a carbon sink?",options:["A storage device for carbon fuels","A natural system that absorbs more carbon than it releases","Underground carbon storage","A carbon tax mechanism"],correctIndex:1,explanation:"Carbon sinks including forests soils and oceans absorb more CO2 than they emit helping offset atmospheric carbon.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the atmospheric lifetime of CO2?",options:["A few days","About a year","Hundreds to thousands of years","Exactly 100 years"],correctIndex:2,explanation:"CO2 remains in the atmosphere for hundreds to thousands of years meaning emissions today will affect climate for generations.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the Keeling Curve?",options:["A graph showing temperature change","A continuous record of atmospheric CO2 concentration since 1958","A map of ocean currents","A model of glacier retreat"],correctIndex:1,explanation:"The Keeling Curve started in 1958 provides the longest continuous record of atmospheric CO2 concentrations.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is a heat dome?",options:["A type of greenhouse","A high-pressure system trapping hot air creating extreme heat events","An industrial cooling structure","A type of solar collector"],correctIndex:1,explanation:"A heat dome occurs when high-pressure systems trap hot air over a region for extended periods causing extreme heat events.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What role do mangroves play in climate?",options:["They increase flooding","They sequester carbon and protect coastlines from storm surge","They emit methane","They have no climate role"],correctIndex:1,explanation:"Mangroves store carbon at high rates and protect coastlines from storms and sea level rise making them vital climate assets.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the ENSO cycle?",options:["A European nuclear body","El Nino-Southern Oscillation a natural climate pattern affecting global weather","An East African environmental body","An energy management system"],correctIndex:1,explanation:"ENSO is a recurring climate pattern affecting rainfall drought and temperature globally including southern Africa.",category:"Climate Science",sdg:"SDG 13",ring:"sadc"},
  {question:"What sea level rise is projected by 2100 under high emissions?",options:["5-10 cm","20-30 cm","0.6-1.0 metres or more","5 metres"],correctIndex:2,explanation:"Under high emissions scenarios sea levels could rise 0.6-1.0 metres or more by 2100 threatening coastal communities globally.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the planetary boundary concept?",options:["National borders in climate law","Safe operating limits for Earth systems within which humanity can thrive","Boundaries between climate zones","Limits of atmospheric models"],correctIndex:1,explanation:"Planetary boundaries define the safe operating space for humanity and several have already been crossed including climate change.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What are compound climate events?",options:["Chemical reactions in the atmosphere","Multiple climate hazards occurring simultaneously or in sequence","A type of weather forecast","Insurance claims for climate damage"],correctIndex:1,explanation:"Compound climate events involve multiple hazards such as drought followed by flood creating amplified impacts on communities.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is attribution science?",options:["Giving credit for climate discoveries","The science of determining how much climate change contributed to specific weather events","A method of carbon accounting","A satellite tracking system"],correctIndex:1,explanation:"Attribution science determines the degree to which human-caused climate change increased the likelihood or intensity of specific weather events.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What did reaching 420 ppm CO2 represent?",options:["The safe limit for CO2","A level not seen for over 3 million years","The global emissions target","The pre-industrial baseline"],correctIndex:1,explanation:"When CO2 surpassed 420 ppm it represented concentrations not seen since the Pliocene epoch over 3 million years ago.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is climate sensitivity?",options:["How sensitive people are to hot weather","The amount of warming expected from a doubling of CO2","A measure of ecosystem fragility","Political sensitivity around climate policy"],correctIndex:1,explanation:"Climate sensitivity measures the expected global temperature increase resulting from a doubling of atmospheric CO2 concentrations.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the role of wetlands in climate regulation?",options:["They increase flooding only","They store carbon regulate water cycles and reduce flood risk","They emit only greenhouse gases","They have no climate role"],correctIndex:1,explanation:"Wetlands store significant amounts of carbon regulate regional water cycles and buffer communities from flood and drought extremes.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What does net zero mean in climate science?",options:["Zero economic growth","Balancing greenhouse gas emissions with equivalent removals from the atmosphere","Zero energy use","Zero carbon taxes"],correctIndex:1,explanation:"Net zero means balancing greenhouse gas emissions produced with equivalent amounts removed from the atmosphere.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is climate downscaling?",options:["Reducing climate targets","Converting global climate model outputs to finer regional or local scales","Shrinking climate departments","Lowering climate finance pledges"],correctIndex:1,explanation:"Climate downscaling translates global climate model outputs into finer regional projections essential for local adaptation planning.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the role of the Congo Basin in global climate?",options:["No global role","It is the world second largest tropical rainforest absorbing vast amounts of CO2","Only affects Central African climate","Only important for biodiversity"],correctIndex:1,explanation:"The Congo Basin is the world second largest tropical rainforest and a critical global carbon sink.",category:"Climate Science",sdg:"SDG 13",ring:"africa"},
  {question:"What was the significance of 2024 global temperature?",options:["No significance","2024 was confirmed as the first year to exceed 1.5C above pre-industrial levels","2024 was the coolest year","Only regional temperatures changed"],correctIndex:1,explanation:"2024 was confirmed as the first calendar year to exceed 1.5C above pre-industrial levels a symbolic and concerning milestone.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is ice core data used for?",options:["Building materials research","Reconstructing past climate conditions including temperature and CO2 levels","Measuring current sea ice","Predicting earthquakes"],correctIndex:1,explanation:"Ice cores trap ancient air bubbles providing records of past CO2 levels and temperatures over hundreds of thousands of years.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the difference between drought and desertification?",options:["They are the same","Drought is temporary water scarcity and desertification is permanent land degradation","Desertification is temporary","Neither affects Africa significantly"],correctIndex:1,explanation:"Drought is a temporary reduction in water availability while desertification is the permanent conversion of productive land to desert.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is Arctic amplification?",options:["The Arctic has no climate significance","The Arctic warms 2-4 times faster than the global average disrupting global weather patterns","Arctic warming only affects polar bears","Arctic changes take centuries to affect other regions"],correctIndex:1,explanation:"Arctic amplification means the Arctic is warming 2-4 times the global average disrupting the jet stream and affecting weather patterns worldwide.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the role of forests in the carbon cycle?",options:["Forests emit only carbon","Forests act as carbon sinks absorbing CO2 through photosynthesis","Forests have no carbon role","Forests only affect local climate"],correctIndex:1,explanation:"Forests absorb CO2 through photosynthesis and store it in biomass and soil acting as critical carbon sinks.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the contribution of agriculture to global greenhouse gas emissions?",options:["Less than 1%","About 10-12% through methane nitrous oxide and CO2","Over 50% of global emissions","Agriculture does not emit greenhouse gases"],correctIndex:1,explanation:"Agriculture contributes about 10-12% of global emissions through livestock methane rice cultivation nitrous oxide and land clearing.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is thermal expansion of seawater?",options:["Ice melting in warm water","The increase in ocean volume as water temperature rises contributing to sea level rise","A tidal phenomenon","The warming of deep ocean vents"],correctIndex:1,explanation:"As seawater warms it expands in volume contributing significantly to sea level rise alongside melting ice.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"How does climate change affect disease patterns in Africa?",options:["It reduces disease","It expands ranges of vector-borne diseases like malaria and dengue","It has no effect","It only affects respiratory disease"],correctIndex:1,explanation:"Climate change expands the geographic range of disease vectors like mosquitoes increasing malaria and dengue fever risk across Africa.",category:"Climate Science",sdg:"SDG 13",ring:"africa"},
  {question:"What is the significance of Zimbabwe Zambezi River Basin for climate?",options:["No significance","It supports hydropower food production and livelihoods for millions and is vulnerable to climate variability","The Zambezi is unaffected by climate change","The Zambezi only matters for borders"],correctIndex:1,explanation:"The Zambezi Basin supports Kariba Dam smallholder agriculture and millions of livelihoods and faces serious climate-related flow reductions.",category:"Climate Science",sdg:"SDG 13",ring:"zimbabwe"},
  {question:"What does SSP stand for in climate projections?",options:["Solar System Programme","Shared Socioeconomic Pathway describing future society and emissions scenarios","Sustainable Sea Protection","Special Scientific Protocol"],correctIndex:1,explanation:"Shared Socioeconomic Pathways describe alternative futures combining socioeconomic development and emissions trajectories used in IPCC AR6 and AR7.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is geoengineering?",options:["Construction of dams","Large-scale technological interventions to counteract climate change","Underground tunnelling","Space exploration"],correctIndex:1,explanation:"Geoengineering refers to deliberate large-scale interventions in Earth systems to counteract climate change effects.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the Hadley Cell?",options:["Irrelevant to African climate","Drives tropical rainfall and subtropical dry zones affecting much of Africa","Only affects coastal weather","Only relevant to European climate"],correctIndex:1,explanation:"The Hadley Cell drives rainfall in tropical Africa and the dry conditions in subtropical zones including southern Africa.",category:"Climate Science",sdg:"SDG 13",ring:"sadc"},
  {question:"What is the role of the Indian Ocean in African climate?",options:["No role","It drives rainfall patterns across East and Southern Africa through temperature gradients","It only affects coastal areas","It cools the African continent"],correctIndex:1,explanation:"The Indian Ocean temperature patterns strongly influence rainfall across East and Southern Africa including Zimbabwe seasonal rains.",category:"Climate Science",sdg:"SDG 13",ring:"zimbabwe"},
  {question:"What is climate variability versus climate change?",options:["They mean the same thing","Variability is natural short-term fluctuation and climate change is long-term human-driven shift","Variability is human-caused","Neither is measurable"],correctIndex:1,explanation:"Climate variability refers to natural fluctuations and climate change refers to long-term shifts attributable to human activities.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the significance of peat bogs for climate?",options:["They have no climate significance","They store vast amounts of carbon accumulated over thousands of years","They release oxygen only","They are only found in tropical regions"],correctIndex:1,explanation:"Peat bogs store carbon equivalent to 50 years of global fossil fuel emissions and their degradation releases massive CO2.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is a climate refugee?",options:["A government climate official","A person displaced from their home due to climate impacts","A climate scientist on field research","A term with no legal definition"],correctIndex:1,explanation:"A climate refugee is a person forced to leave their home due to climate impacts though this status lacks formal legal recognition.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the carbon footprint of cement production?",options:["Zero emissions","About 8% of global CO2 emissions","Less than 1% of emissions","Only relevant in developed countries"],correctIndex:1,explanation:"Cement production accounts for approximately 8% of global CO2 emissions making it a critical decarbonisation target.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"How does warming accelerate the water cycle?",options:["Warming slows the water cycle","Warming accelerates the water cycle intensifying droughts and floods","The water cycle is unrelated to temperature","Only coastal areas are affected"],correctIndex:1,explanation:"A warmer atmosphere holds more moisture accelerating the water cycle and making wet regions wetter and dry regions drier.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What risks increase significantly beyond 1.5C of warming?",options:["No specific risks","Coral bleaching extreme heat sea level rise and ecosystem collapse increase dramatically","Only relevant to polar regions","1.5C is not a meaningful threshold"],correctIndex:1,explanation:"At 1.5C risks of coral bleaching extreme heat sea level rise and ecosystem collapse increase dramatically.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is aerosol forcing?",options:["Wind speed measurement","The cooling or warming effect of particles suspended in the atmosphere","Solar panel efficiency","Air pollution monitoring"],correctIndex:1,explanation:"Aerosols can either cool Earth by reflecting sunlight or warm it by absorbing radiation.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is biomass burning climate impact?",options:["Cooking with firewood only","Burning vegetation releasing CO2 and aerosols affecting climate","A renewable energy with zero emissions","Only relevant to tropical forests"],correctIndex:1,explanation:"Biomass burning releases CO2 black carbon and aerosols affecting both greenhouse gas concentrations and regional precipitation patterns.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the carbon budget concept?",options:["A government climate spending plan","The cumulative CO2 that can be emitted while staying within a temperature target","A personal carbon offset scheme","A carbon trading price system"],correctIndex:1,explanation:"The carbon budget is the total cumulative CO2 emissions allowable while keeping warming within 1.5C or 2C targets.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the difference between flood and flash flood?",options:["They are the same","Flash floods are sudden while regular floods develop over longer periods","Regular floods are more dangerous","Flash floods only occur in deserts"],correctIndex:1,explanation:"Flash floods occur rapidly with little warning often from intense rainfall while regular floods develop more slowly.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"How is precipitation intensity changing?",options:["Amount of daily sunshine","It is increasing globally due to a warmer wetter atmosphere","Wind speed during storms","Rate of glacier formation"],correctIndex:1,explanation:"Precipitation intensity the amount of rain per event is increasing as a warmer atmosphere holds and releases more moisture.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What do cyclones hurricanes and typhoons have in common?",options:["Completely different phenomena","They are all tropical storms named differently by region","Cyclones are weaker than hurricanes","Typhoons only occur in Africa"],correctIndex:1,explanation:"Cyclones hurricanes and typhoons are all tropical storms but named differently by region.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is the East African Rift Valley lakes climate impact?",options:["They are growing larger","Water levels are fluctuating and some are shrinking due to altered rainfall and evaporation","They are unaffected","They are only becoming saltier"],correctIndex:1,explanation:"Climate change is causing significant fluctuations in East African Rift Valley lakes threatening biodiversity and fishing communities.",category:"Climate Science",sdg:"SDG 13",ring:"africa"},
  {question:"What is the role of science in climate policy?",options:["Science is separate from policy","Scientific evidence provides the foundation for climate policy decisions and negotiations","Policy should ignore climate science","Only economics matters for climate policy"],correctIndex:1,explanation:"Climate science provides the evidence base for policy decisions ensuring climate action is grounded in understanding of risks and solutions.",category:"Climate Action",sdg:"SDG 4",ring:"global"},
  {question:"What is the Sahel climate significance?",options:["It has no climate significance","It is a frontline region showing desertification drought and climate migration dynamics","It is the wettest region in Africa","It is unaffected by climate change"],correctIndex:1,explanation:"The Sahel is a critical climate science case study experiencing desertification food insecurity and climate-driven displacement.",category:"Climate Science",sdg:"SDG 13",ring:"africa"},
  {question:"What is climate forcing?",options:["Political pressure on climate policy","Any external factor that alters Earth energy balance","Wind strength measurement","Ocean current speed"],correctIndex:1,explanation:"Climate forcing refers to factors that alter Earth energy balance including greenhouse gases solar variability and volcanic eruptions.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What did 2023 being hottest year on record confirm?",options:["No significance","Accelerating warming trends and increased urgency for climate action","It was an isolated event","It only affected Europe"],correctIndex:1,explanation:"2023 being the hottest year on record at the time confirmed the accelerating pace of global warming driven by greenhouse gas emissions.",category:"Climate Science",sdg:"SDG 13",ring:"global"},
  {question:"What is cloud albedo?",options:["The colour of clouds","The reflectivity of clouds that cools Earth by reflecting sunlight","Cloud formation altitude","Cloud moisture content"],correctIndex:1,explanation:"Cloud albedo refers to clouds ability to reflect incoming solar radiation back to space providing a cooling effect.",category:"Climate Science",sdg:"SDG 13",ring:"global"},

  {question:"How does climate change affect biodiversity?",options:["It increases all species populations","It threatens species through habitat loss temperature shifts and altered seasons","It only affects marine species","It has no significant effect"],correctIndex:1,explanation:"Climate change threatens biodiversity through habitat destruction temperature changes altered seasons and increased extinction rates.",category:"Climate Science",sdg:"SDG 13",ring:"global"},

  {question:"What is climate mainstreaming?",options:["Climate news broadcasting","Integrating climate change considerations into all government policies planning and budgeting","A type of climate communication","Climate advocacy in mainstream media"],correctIndex:1,explanation:"Climate mainstreaming integrates climate risk and opportunities into all government policies planning processes and budget allocation decisions.",category:"Policy & Governance",sdg:"SDG 13",ring:"global"},
  {question:"What is subnational climate governance?",options:["Underground climate monitoring","Climate action by provinces cities and districts complementing national policy","A type of rural development programme","Climate governance in developing countries only"],correctIndex:1,explanation:"Subnational climate governance by provinces cities and districts is increasingly important for implementing national climate commitments.",category:"Policy & Governance",sdg:"SDG 16",ring:"global"},
  {question:"What is a National Climate Change Policy?",options:["A party political manifesto","A government framework setting out national priorities strategies and institutional arrangements for climate action","An international climate treaty","A voluntary business climate commitment"],correctIndex:1,explanation:"A National Climate Change Policy provides the overarching government framework for coordinating climate mitigation adaptation and governance.",category:"Policy & Governance",sdg:"SDG 13",ring:"global"},
  {question:"What is the Long-Term Low Emissions Development Strategy?",options:["A 10-year climate plan","A country mid-century strategy for achieving deep emissions reductions in line with Paris Agreement goals","A five-year NDC update","A climate finance strategy"],correctIndex:1,explanation:"LT-LEDS are countries 50-year visions for transforming their economies toward low-carbon climate-resilient development.",category:"Policy & Governance",sdg:"SDG 13",ring:"global"},
  {question:"What is the significance of Zimbabwe Climate Change Act?",options:["No significance","Zimbabwe Climate Change Act provides a legislative framework for mainstreaming climate action across government","Zimbabwe does not have climate legislation","It only affects the energy sector"],correctIndex:1,explanation:"Zimbabwe Climate Change Act creates a legal framework for climate governance integrating climate into national planning and budgeting processes.",category:"Policy & Governance",sdg:"SDG 16",ring:"zimbabwe"},
  {question:"What is the relationship between debt and climate action in Africa?",options:["No relationship","High debt burdens prevent African countries from investing in climate adaptation and clean energy","Debt helps fund climate action","Only developed countries have debt-climate challenges"],correctIndex:1,explanation:"Africa heavy debt burden constrains fiscal space for climate investments a major governance challenge.",category:"Policy & Governance",sdg:"SDG 17",ring:"africa"},
  {question:"What is the Bridgetown Initiative?",options:["A Barbados tourism programme","A proposal for reforming the global financial architecture to better fund climate action in developing countries","A type of carbon market","A multilateral climate agreement"],correctIndex:1,explanation:"The Bridgetown Initiative led by Barbados calls for reforming multilateral development banks to unlock climate finance for vulnerable nations.",category:"Policy & Governance",sdg:"SDG 17",ring:"global"},
  {question:"What is the role of civil society in climate governance?",options:["Civil society has no formal climate role","Civil society advocates for ambition monitors implementation and ensures voices of the most vulnerable reach negotiators","Civil society only protests","Civil society manages climate finance"],correctIndex:1,explanation:"Civil society organisations play a critical role in climate governance advocating monitoring innovating and amplifying vulnerable communities voices.",category:"Policy & Governance",sdg:"SDG 16",ring:"global"},
  {question:"What is the significance of the African Group of Negotiators?",options:["No significance","The AGN coordinates Africa unified position in UNFCCC negotiations ensuring the continent climate priorities are heard","The AGN manages African climate finance","The AGN is an academic body"],correctIndex:1,explanation:"The African Group of Negotiators coordinates African countries positions in UNFCCC negotiations amplifying the continent voice on climate equity.",category:"Policy & Governance",sdg:"SDG 17",ring:"africa"},
  {question:"What is the principle of intergenerational equity in climate policy?",options:["Equal sharing between current generations","The obligation to preserve the environment for future generations a core principle of sustainable development","A type of climate investment","Equal voting rights at climate conferences"],correctIndex:1,explanation:"Intergenerational equity requires that current generations do not compromise the environmental conditions future generations will inherit.",category:"Policy & Governance",sdg:"SDG 13",ring:"global"},
  {question:"What is climate equity in policy?",options:["Equal funding for all countries","Ensuring climate policy distributes benefits and burdens fairly including historical responsibility and current capacity","Equity between climate scientists","Equal representation in climate conferences"],correctIndex:1,explanation:"Climate equity requires policies that fairly distribute climate costs and benefits accounting for historical emissions vulnerability and development needs.",category:"Policy & Governance",sdg:"SDG 10",ring:"global"},
  {question:"What is Paris Agreement Article 2.1c?",options:["A clause about NDC ambition","The finance goal aligning financial flows with low-greenhouse-gas and climate-resilient development","The adaptation goal","The transparency framework"],correctIndex:1,explanation:"Article 2.1c of the Paris Agreement calls for making financial flows consistent with low-emission and climate-resilient development pathways.",category:"Policy & Governance",sdg:"SDG 17",ring:"global"},
  {question:"What is the role of the PGCN in Zimbabwe climate governance?",options:["No role","PGCN contributes youth perspectives climate literacy and community-level advocacy to Zimbabwe climate governance","PGCN is a government body","PGCN only manages climate finance"],correctIndex:1,explanation:"PGCN contributes youth leadership climate education and grassroots advocacy to Zimbabwe climate governance aligned with national and international frameworks.",category:"Policy & Governance",sdg:"SDG 16",ring:"zimbabwe"},
  {question:"What is the role of the DEI Advocates Fellowship in climate governance?",options:["No role","The DEI Advocates Fellowship builds leaders who integrate diversity equity and inclusion into climate organisations and schools","DEI is separate from climate","DEI only applies to corporate governance"],correctIndex:1,explanation:"The DEI Advocates Fellowship develops leaders including those working in climate organisations to integrate equity and inclusion into their governance practices.",category:"Policy & Governance",sdg:"SDG 10",ring:"global"},
  {question:"What is Zimbabwe Vision 2030 climate dimension?",options:["Vision 2030 has no climate dimension","Zimbabwe Vision 2030 aspires to upper-middle income status requiring climate-resilient agriculture clean energy and green growth","Vision 2030 focuses only on economic growth","Climate is separate from development planning"],correctIndex:1,explanation:"Zimbabwe Vision 2030 aspirations for upper-middle income status require climate-resilient agriculture clean energy access and sustainable natural resource management.",category:"Policy & Governance",sdg:"SDG 8",ring:"zimbabwe"},
  {question:"What is fossil fuel subsidy reform and its climate governance significance?",options:["Unrelated to climate governance","Redirecting fossil fuel subsidies to clean energy and social protection is a critical climate governance reform","Subsidies only affect the oil industry","Subsidy reform is purely an economic matter"],correctIndex:1,explanation:"Fossil fuel subsidy reform redirects hundreds of billions of dollars from carbon-intensive activities to clean energy and climate adaptation accelerating the energy transition.",category:"Policy & Governance",sdg:"SDG 13",ring:"global"},
  {question:"What is a carbon tax and its governance role?",options:["A penalty for individual carbon crimes","A price placed on greenhouse gas emissions to create financial incentives for reducing them","A tax on all energy use","A climate fine for corporations only"],correctIndex:1,explanation:"A carbon tax places a price on greenhouse gas emissions creating economic incentives for businesses and individuals to reduce emissions and invest in clean alternatives.",category:"Policy & Governance",sdg:"SDG 13",ring:"global"},
  {question:"What is the role of youth NDC advocacy in Zimbabwe?",options:["Youth have no NDC role","Youth advocates in Zimbabwe push for more ambitious NDC targets and inclusive implementation processes","NDCs are only for governments","Youth advocacy has no effect on policy"],correctIndex:1,explanation:"Youth advocates in Zimbabwe including through PGCN push for more ambitious NDC targets and ensure youth perspectives are integrated into national climate planning.",category:"Policy & Governance",sdg:"SDG 13",ring:"zimbabwe"},
  {question:"What is the Warsaw Mechanism for Loss and Damage?",options:["A Polish climate law","A UNFCCC body established in 2013 to address climate loss and damage in vulnerable countries","A financial compensation fund","A carbon trading mechanism"],correctIndex:1,explanation:"The Warsaw Mechanism established at COP19 addresses loss and damage associated with climate change in developing nations.",category:"Policy & Governance",sdg:"SDG 13",ring:"global"},
  {question:"What is the role of regional bodies in climate governance in Africa?",options:["No role","Bodies like SADC IGAD and ECOWAS develop regional climate frameworks supporting member states adaptation and mitigation efforts","Regional bodies only manage trade","African regional bodies defer entirely to the AU"],correctIndex:1,explanation:"Regional bodies like SADC IGAD and ECOWAS develop climate strategies share knowledge and coordinate adaptation across member states.",category:"Policy & Governance",sdg:"SDG 17",ring:"sadc"},
  {question:"What is the Global Goal on Adaptation under the Paris Agreement?",options:["A specific numerical adaptation target","A framework to enhance adaptive capacity strengthen resilience and reduce climate vulnerability globally","A fund for adaptation only","A binding adaptation commitment"],correctIndex:1,explanation:"The Global Goal on Adaptation enhances adaptive capacity resilience and reduced vulnerability globally a framework target rather than a specific number.",category:"Policy & Governance",sdg:"SDG 13",ring:"global"},
  {question:"What is the Means of Implementation under the Paris Agreement?",options:["Practical tools for emissions measurement","Finance technology transfer and capacity building support provided to developing countries to implement climate action","A type of climate enforcement mechanism","Implementation guidelines for scientists"],correctIndex:1,explanation:"Means of Implementation finance technology and capacity building are the support developed countries provide to help developing nations act on climate.",category:"Policy & Governance",sdg:"SDG 17",ring:"global"},
  {question:"What is the significance of COP28 in Dubai for Africa?",options:["No significance for Africa","COP28 operationalised the Loss and Damage Fund and committed to tripling renewables important gains for African climate finance","COP28 only benefited developed countries","COP28 made no significant decisions"],correctIndex:1,explanation:"COP28 in Dubai operationalised the Loss and Damage Fund agreed to triple renewable energy and included language on transitioning away from fossil fuels representing significant gains for Africa.",category:"Policy & Governance",sdg:"SDG 13",ring:"africa"},
  {question:"Which renewable energy source has the most potential for Zimbabwe?",options:["Tidal energy","Solar energy","Geothermal energy","Wave energy"],correctIndex:1,explanation:"Zimbabwe receives abundant solar radiation year-round making solar its greatest renewable resource.",category:"Renewable Energy",sdg:"SDG 7",ring:"zimbabwe"},
  {question:"What is net-zero emissions?",options:["Producing no energy","Balancing emissions produced with emissions removed","Using only nuclear power","A type of carbon tax"],correctIndex:1,explanation:"Net-zero means greenhouse gas emissions produced are balanced by an equivalent amount removed from the atmosphere.",category:"Renewable Energy",sdg:"SDG 13",ring:"global"},
  {question:"What is the main advantage of solar home systems for rural Africa?",options:["Only works in cities","Off-grid electricity without fuel costs or grid infrastructure","Requires very large land areas","Only works in deserts"],correctIndex:1,explanation:"Solar home systems enable off-grid communities like Ward 3 Chivi District to access clean electricity affordably.",category:"Renewable Energy",sdg:"SDG 7",ring:"local"},
  {question:"What does energy transition mean?",options:["Switching electricity providers","Shifting the energy system from fossil fuels to renewables","Importing energy from other countries","Increasing coal production temporarily"],correctIndex:1,explanation:"Energy transition is the structural shift of the global energy sector away from fossil-based systems toward renewable sources.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What type of energy does Kariba Dam generate?",options:["Solar","Wind","Hydroelectric","Geothermal"],correctIndex:2,explanation:"Kariba Dam generates hydroelectric power. It is one of the world largest hydroelectric dams by reservoir volume.",category:"Renewable Energy",sdg:"SDG 7",ring:"zimbabwe"},
  {question:"What is energy poverty?",options:["Paying high electricity bills","Lack of access to modern affordable and reliable energy","A decline in fossil fuel revenue","Over-dependence on hydropower"],correctIndex:1,explanation:"Energy poverty affects hundreds of millions of Africans limiting health education and economic opportunity.",category:"Renewable Energy",sdg:"SDG 7",ring:"africa"},
  {question:"What share of the world solar energy potential is in Africa?",options:["Under 10%","Around 20%","Over 40%","About 60%"],correctIndex:2,explanation:"Africa holds over 40% of the world solar energy potential yet produces a fraction of global solar power.",category:"Renewable Energy",sdg:"SDG 7",ring:"africa"},
  {question:"What is green hydrogen?",options:["Naturally occurring hydrogen in rainforests","Hydrogen produced from renewable electricity via electrolysis","A type of hydroelectric energy","A biofuel made from algae"],correctIndex:1,explanation:"Green hydrogen uses renewable electricity to split water. Africa solar resources position it as a potential major producer.",category:"Renewable Energy",sdg:"SDG 7",ring:"africa"},
  {question:"What role does energy storage play in the renewable transition?",options:["Not needed with modern solar","Stores excess renewable energy for use when generation is low","Only applies to nuclear energy","Replaces the need for solar panels"],correctIndex:1,explanation:"Energy storage particularly batteries is critical for renewable reliability storing surplus solar or wind energy.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is distributed renewable energy DRE?",options:["Large centralised wind stations","Small-scale renewable systems deployed at point of use for off-grid access","Sharing electricity from urban to rural grids","A carbon trading system"],correctIndex:1,explanation:"DRE solar home systems and mini-grids is the most viable pathway to energy access in rural Zimbabwe.",category:"Renewable Energy",sdg:"SDG 7",ring:"zimbabwe"},
  {question:"What is the significance of SDG 7 for climate action?",options:["It addresses ocean conservation","It calls for affordable clean reliable energy foundational to development and climate mitigation","It focuses on zero hunger","It covers sustainable cities only"],correctIndex:1,explanation:"SDG 7 Affordable and Clean Energy is foundational transitioning to clean energy reduces emissions while supporting development.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is a solar mini-grid?",options:["A small solar panel for one home","A local electricity network powered by solar serving a community of multiple households and businesses","A grid-connected solar farm","A solar panel manufacturer"],correctIndex:1,explanation:"Solar mini-grids provide community-level electricity through a local network ideal for rural African communities without national grid access.",category:"Renewable Energy",sdg:"SDG 7",ring:"africa"},
  {question:"What is wind energy?",options:["Energy from burning gas","Electricity generated by wind turbines converting kinetic energy of wind","Energy stored in compressed air","Heat energy from wind friction"],correctIndex:1,explanation:"Wind energy converts the kinetic energy of wind into electricity through turbines a growing renewable source globally.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is biogas?",options:["Natural gas from fossil fuels","Gas produced from decomposing organic material used for cooking and power","A type of industrial chemical","Solar energy stored as gas"],correctIndex:1,explanation:"Biogas is produced through anaerobic digestion of organic material offering rural African communities clean cooking and power from waste.",category:"Renewable Energy",sdg:"SDG 7",ring:"africa"},
  {question:"What is the levelised cost of energy?",options:["Monthly electricity bills","The average cost of electricity generated over a project lifetime used to compare energy sources","A government energy pricing policy","The cost of building a power station"],correctIndex:1,explanation:"LCOE measures the average cost per unit of electricity over a project lifetime solar LCOE has fallen dramatically making it cost-competitive.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is a feed-in tariff?",options:["A tax on energy imports","A policy paying renewable energy producers a fixed price for electricity fed into the grid","A grid connection fee","A renewable energy certification"],correctIndex:1,explanation:"Feed-in tariffs guarantee renewable energy producers a fixed price per unit fed into the grid reducing investment risk and driving deployment.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is energy efficiency?",options:["Using more energy for better output","Using less energy to achieve the same output reducing emissions and costs","Only relevant to industrial energy users","A type of energy storage"],correctIndex:1,explanation:"Energy efficiency reduces the amount of energy needed for a given activity cutting both energy costs and greenhouse gas emissions.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is the International Renewable Energy Agency?",options:["A private renewable energy company","An intergovernmental organisation supporting countries transition to renewable energy","A UN committee on energy","A renewable energy research institute"],correctIndex:1,explanation:"IRENA supports countries in accelerating the adoption and sustainable use of renewable energy providing data analysis and policy advice.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is a smart grid?",options:["An electricity grid with solar panels","A digitally enhanced electricity grid enabling two-way energy flows real-time monitoring and integration of renewables","A grid connecting African countries","A mobile phone charging network"],correctIndex:1,explanation:"Smart grids use digital technology to manage electricity supply and demand efficiently integrating renewable energy and improving reliability.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is the cost trend for solar photovoltaic technology?",options:["Costs are increasing due to material scarcity","Solar PV costs have fallen over 90% in the past decade making it the cheapest electricity source in history","Solar costs have remained stable","Solar is still more expensive than coal in Africa"],correctIndex:1,explanation:"Solar PV costs fell over 90% between 2010 and 2024 making solar the cheapest source of new electricity generation in most of the world.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is clean cooking?",options:["Cooking without spills","Using improved cookstoves or clean fuels like gas electricity or biogas reducing indoor air pollution","Cooking in a clean kitchen","Cooking only with electricity"],correctIndex:1,explanation:"Clean cooking transitions households from biomass fires to improved stoves or clean fuels reducing the 3.7 million annual deaths from indoor air pollution.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is geothermal energy?",options:["Energy from burning rocks","Heat energy from the Earth interior used for electricity generation and heating","Solar energy stored underground","Energy from underground water pressure"],correctIndex:1,explanation:"Geothermal energy harnesses heat from Earth interior Kenya leads Africa in geothermal power generating over 50% of its electricity.",category:"Renewable Energy",sdg:"SDG 7",ring:"africa"},
  {question:"What is tidal energy?",options:["Energy from ocean waves only","Electricity generated by harnessing tidal movements of oceans","Energy from underwater currents only","Offshore wind energy"],correctIndex:1,explanation:"Tidal energy harnesses predictable tidal movements to generate electricity with significant potential in coastal regions globally.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is the role of batteries in the energy transition?",options:["Batteries are not needed in renewable energy","Batteries store renewable energy enabling supply when sun and wind are unavailable critical for grid stability","Batteries are only for electric vehicles","Batteries replace solar panels"],correctIndex:1,explanation:"Battery storage is essential for renewable grids storing excess solar and wind power for use during periods of low generation.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is energy sovereignty?",options:["A country military energy reserves","Communities right to control their own energy production and distribution through renewable resources","A national energy monopoly","Energy independence through fossil fuels"],correctIndex:1,explanation:"Energy sovereignty means communities control their own clean energy production reducing dependence on fossil fuel imports and centralised grids.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is Zimbabwe coal dependence significance for climate?",options:["Coal is Zimbabwe best energy option","Zimbabwe reliance on coal for over 70% of electricity is a major emissions source requiring energy transition","Coal use is declining rapidly in Zimbabwe","Zimbabwe uses very little coal"],correctIndex:1,explanation:"Zimbabwe heavy coal dependence contributes to emissions and creates vulnerability requiring an energy transition to renewables for climate and development goals.",category:"Renewable Energy",sdg:"SDG 7",ring:"zimbabwe"},
  {question:"What is a power purchase agreement in renewable energy?",options:["An electricity bill agreement","A long-term contract between a renewable energy producer and buyer guaranteeing purchase of electricity at agreed prices","A government energy licence","A community energy sharing agreement"],correctIndex:1,explanation:"PPAs provide long-term revenue certainty for renewable energy investors by guaranteeing purchase of output critical for project financing.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is the African Renewable Energy Initiative?",options:["A private sector energy fund","A Pan-African initiative to add 300GW of new renewable energy capacity by 2030 across the continent","A research programme on African energy","An initiative specific to North Africa"],correctIndex:1,explanation:"AREI aims to add 300GW of renewable energy across Africa by 2030 transforming the continent energy landscape and supporting development.",category:"Renewable Energy",sdg:"SDG 7",ring:"africa"},
  {question:"What is the relationship between electrification and girls education?",options:["No relationship","Electrification enables evening study reduces time on firewood collection and supports school digital tools directly benefiting girls","Electricity only benefits boys","Electrification only matters for industry"],correctIndex:1,explanation:"Rural electrification enables evening study reduces girls firewood collection burden and powers school ICT directly improving girls educational outcomes.",category:"Renewable Energy",sdg:"SDG 4",ring:"global"},
  {question:"What is wave energy?",options:["Energy from ocean winds","Electricity generated from the movement of ocean waves","Tidal energy","Deep ocean thermal energy"],correctIndex:1,explanation:"Wave energy converts the kinetic and potential energy of ocean surface waves into electricity with significant global potential.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is the significance of falling electric vehicle costs for climate?",options:["EVs are not relevant to climate","Falling EV costs make transport decarbonisation viable especially as electricity grids become cleaner","EVs are only for wealthy countries","Electric vehicles increase emissions"],correctIndex:1,explanation:"Rapidly falling electric vehicle costs especially battery prices are making transport decarbonisation achievable globally.",category:"Climate Action",sdg:"SDG 11",ring:"global"},
  {question:"What is a community energy cooperative?",options:["A government energy company","A community-owned renewable energy enterprise sharing investment and benefits among members","An energy charity","A corporate renewable energy project"],correctIndex:1,explanation:"Community energy cooperatives enable communities to collectively own renewable energy assets sharing benefits and building local energy resilience.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is the role of renewable energy in Zimbabwe Vision 2030?",options:["No role","Zimbabwe Vision 2030 includes clean energy access as a pillar of upper-middle-income development","Vision 2030 focuses only on agriculture","Renewable energy is not in Zimbabwe development plans"],correctIndex:1,explanation:"Zimbabwe Vision 2030 aspires to upper-middle-income status requiring expanded clean energy access for households industry and agriculture.",category:"Renewable Energy",sdg:"SDG 7",ring:"zimbabwe"},
  {question:"What is pumped hydro storage?",options:["A type of water treatment","Storing energy by pumping water uphill when energy is surplus and releasing it through turbines when needed","A flood control mechanism","Hydroelectric power on rivers"],correctIndex:1,explanation:"Pumped hydro storage is the most widely used grid-scale energy storage pumping water uphill with excess power and releasing it when needed.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is the relationship between renewable energy and job creation in Africa?",options:["Renewables destroy more jobs than they create","Renewable energy creates significantly more jobs per unit of energy than fossil fuels with major African employment potential","Jobs are only in installation","Renewable energy jobs only exist in manufacturing countries"],correctIndex:1,explanation:"Renewables create 3x more jobs per unit of energy than fossil fuels with Africa renewable potential representing a major employment opportunity.",category:"Policy & Governance",sdg:"SDG 8",ring:"africa"},
  {question:"What is a hydrogen economy?",options:["An economy powered by water only","An energy system where hydrogen produced from renewables serves as a clean fuel for industry transport and heating","A financial system based on hydrogen trading","An economy dependent on hydropower"],correctIndex:1,explanation:"A hydrogen economy uses green hydrogen produced from renewable electricity as a clean energy carrier for sectors difficult to electrify directly.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is the significance of the SADC Energy Protocol?",options:["No significance","The SADC Energy Protocol promotes regional energy cooperation including renewable energy development and energy access","It only governs electricity trading","It focuses on fossil fuel development"],correctIndex:1,explanation:"The SADC Energy Protocol provides the framework for regional energy cooperation including renewable energy deployment and electricity grid integration.",category:"Renewable Energy",sdg:"SDG 7",ring:"sadc"},
  {question:"What is agrivoltaics?",options:["Agricultural pesticide technology","Combining solar panels with agriculture growing crops or raising livestock under or between solar arrays","A type of biofuel crop","Vertical farming technology"],correctIndex:1,explanation:"Agrivoltaics combines solar energy production with food production on the same land offering dual benefits for energy access and food security.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is a renewable energy auction?",options:["A sale of renewable energy companies","A competitive bidding process where renewable energy developers offer to supply electricity at the lowest price","A government renewable energy lottery","A carbon market auction"],correctIndex:1,explanation:"Renewable energy auctions use competitive bidding to procure clean electricity at lowest cost driving down prices and accelerating deployment.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is the significance of clean energy access for maternal health?",options:["No relationship","Clean energy powers health facilities refrigerates medicines and eliminates indoor air pollution directly improving maternal and child health","Energy access only matters for industry","Maternal health depends on medical training only"],correctIndex:1,explanation:"Clean energy access powers health clinics refrigerates vaccines enables safe deliveries at night and eliminates indoor air pollution vital for maternal health.",category:"Climate Action",sdg:"SDG 3",ring:"global"},
  {question:"What is grid parity for renewable energy?",options:["Equal distribution of electricity","The point at which the cost of renewable energy equals the cost of conventional electricity from the grid","A type of electricity regulation","Equal access to the electricity grid"],correctIndex:1,explanation:"Grid parity is reached when renewable energy costs equal conventional grid electricity making renewables the economic choice without subsidies.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is the relationship between climate change and Zimbabwe hydroelectric power?",options:["No relationship","Climate change reduces rainfall and river flows threatening the hydroelectric output of Kariba Dam","Climate change improves hydropower in Zimbabwe","Zimbabwe power is unaffected by climate"],correctIndex:1,explanation:"Reduced rainfall and river flows due to climate change are reducing water levels at Kariba Dam threatening Zimbabwe hydroelectric power generation.",category:"Renewable Energy",sdg:"SDG 7",ring:"zimbabwe"},
  {question:"What is a virtual power plant?",options:["A digital simulation of energy production","A network of distributed energy resources coordinated digitally to function as a single power plant","A renewable energy game","A type of energy consulting firm"],correctIndex:1,explanation:"Virtual power plants aggregate distributed energy resources using digital technology providing grid services and flexibility equivalent to conventional generation.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},
  {question:"What is the role of women in Africa renewable energy sector?",options:["Women have no role in energy","Women are critical as consumers entrepreneurs and workers in Africa renewable energy sector yet face barriers","Women dominate the energy sector","Women role is only in administration"],correctIndex:1,explanation:"Women represent both the majority of energy poor and a major untapped opportunity as renewable energy entrepreneurs workers and community leaders.",category:"Renewable Energy",sdg:"SDG 5",ring:"africa"},
  {question:"What is Zimbabwe solar irradiance advantage?",options:["No significance","Zimbabwe receives 5-6 kWh per m2 per day among the highest in the world making solar the logical energy choice","Zimbabwe has average solar resources","High irradiance makes solar panels less effective"],correctIndex:1,explanation:"Zimbabwe exceptional solar irradiance of 5-6 kWh per m2 per day makes solar photovoltaic among the most cost-effective energy options for the country.",category:"Renewable Energy",sdg:"SDG 7",ring:"zimbabwe"},

  {question:"What is the PGCN climate and energy education approach?",options:["PGCN has no energy education","PGCN integrates renewable energy literacy into climate education linking SDG 7 and SDG 13 for youth in Zimbabwe","PGCN only teaches science","Energy education is only for engineers"],correctIndex:1,explanation:"PGCN integrates renewable energy literacy into its climate education programmes linking SDG 7 affordable clean energy with SDG 13 climate action for Zimbabwean youth.",category:"Renewable Energy",sdg:"SDG 7",ring:"zimbabwe"},
  {question:"What is the significance of mini solar grids for Ward 3 Chivi District?",options:["No significance","Mini solar grids can provide reliable affordable electricity to Ward 3 households and community facilities without national grid extension","Ward 3 already has reliable electricity","Solar is not suitable for Chivi District"],correctIndex:1,explanation:"Mini solar grids represent the most viable pathway to electricity access for Ward 3 Chivi District bypassing the cost of extending the national grid to remote areas.",category:"Renewable Energy",sdg:"SDG 7",ring:"local"},
  {question:"What is the connection between clean cooking and gender equality?",options:["No connection","Clean cooking reduces the time women spend collecting firewood and the health risks from indoor smoke directly advancing gender equality","Clean cooking only affects health","Cooking methods have no gender dimension"],correctIndex:1,explanation:"Clean cooking saves women hours of firewood collection daily reduces indoor air pollution health risks and frees time for education and economic activity directly advancing gender equality.",category:"Renewable Energy",sdg:"SDG 5",ring:"global"},

  {question:"What is solar energy role in Zimbabwe school development?",options:["No role","Solar energy powers schools that lack grid electricity enabling evening study computer labs and digital climate education","Schools do not need electricity","Solar energy is too expensive for schools"],correctIndex:1,explanation:"Solar energy can transform rural Zimbabwe schools enabling evening study digital learning and computer-based climate education in communities like Ward 3 Chivi District.",category:"Renewable Energy",sdg:"SDG 4",ring:"local"},
  {question:"What is the Sustainable Energy for All initiative?",options:["A private energy company","A global initiative by the UN and partners to achieve universal energy access energy efficiency and renewable energy goals","A research programme","An energy trading platform"],correctIndex:1,explanation:"SEforALL is a global initiative supporting the achievement of SDG 7 universal clean energy access efficiency and renewable deployment.",category:"Renewable Energy",sdg:"SDG 7",ring:"global"},

// ── SHA-256 PIN HASHER ──
async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// ── AUDIO FEEDBACK ──
function playTone(correct) {
  try {
    const a = new (window.AudioContext||window.webkitAudioContext)();
    const o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = correct?"sine":"square";
    o.frequency.value = correct?660:180;
    g.gain.setValueAtTime(0.18, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+0.45);
    o.start(); o.stop(a.currentTime+0.45);
  } catch {}
}

  if(screen==="loading") return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <style>{SPIN}</style>
      <div style={{textAlign:"center",maxWidth:400,padding:20}}>
        <div style={{width:90,height:90,background:"linear-gradient(135deg,#22c55e,#a855f7)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 24px",boxShadow:"0 0 60px rgba(34,197,94,.4)",overflow:"hidden",border:"3px solid #22c55e",width:80,height:80,borderRadius:"50%"}}><img src={LOGO} alt="PGCN" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
        <Loader2 size={40} style={{color:C.green,animation:"spin 1s linear infinite",margin:"0 auto 16px",display:"block"}}/>
        <h2 style={{color:"#fff",fontWeight:800,fontSize:22,marginBottom:8}}>{t.gen2}</h2>
        <p style={{color:"#6b7280",fontSize:13,marginBottom:20}}>{t.ai}</p>
        <div style={{background:"rgba(34,197,94,.08)",border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 18px"}}>

  if(screen==="game"&&qs.length>0) {

    return (
      <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>

            <div style={{flex:1,background:"rgba(255,255,255,.06)",borderRadius:99,height:6,overflow:"hidden"}}>

            <span style={{color:"#9ca3af",fontSize:14,fontWeight:700}}>{t.q} {qi+1} {t.of} {qs.length}</span>

            <h2 style={{color:"#fff",fontWeight:700,fontSize:mob?16:18,lineHeight:1.55}}>{q.question}</h2>
          </div>
          {shown&&picked===null&&(
            <div style={{...G(),padding:14,marginBottom:14,borderColor:C.red,textAlign:"center"}}>

              const bc=shown?(cor?C.green:sel?C.red:"rgba(255,255,255,.08)"):"rgba(255,255,255,.08)";
              const tc=shown?(cor?C.green:sel?C.red:"#9ca3af"):"#d1d5db";
              return <button key={idx} onClick={()=>pick(idx)} disabled={shown} style={{background:bg,border:`2px solid ${bc}`,borderRadius:12,padding:"14px 18px",color:tc,fontWeight:600,fontSize:mob?14:15,cursor:shown?"default":"pointer",textAlign:"left",transition:"all .2s",display:"flex",alignItems:"center",gap:12}}><span style={{background:"rgba(255,255,255,.08)",borderRadius:6,padding:"2px 9px",fontWeight:800,fontSize:12,flexShrink:0}}>{String.fromCharCode(65+idx)}</span>{opt}</button>;
            })}
          </div>
          {shown&&<>
            <div style={{...G(),padding:18,marginBottom:14,borderColor:picked===q.correctIndex?C.green:C.red}}>
              <div style={{color:picked===q.correctIndex?C.green:C.red,fontWeight:800,marginBottom:6}}>{picked===q.correctIndex?t.ok:t.no}</div>
              <div style={{color:"#9ca3af",fontSize:14,lineHeight:1.6}}>{q.explanation}</div>
            </div>
            <button onClick={next} style={{...Btn(C.green),width:"100%",fontSize:16,padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {qi<qs.length-1?t.nextQ:t.seeR} <ChevronRight size={18}/>
            </button>
