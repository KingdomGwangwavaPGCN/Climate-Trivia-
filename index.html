// ── SHA-256 PIN HASHER ──
async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// ── AUDIO FEEDBACK ──
function playTone(correct) {
  try {
    const a = new (window.AudioContext||window.webkitAudioContext)();
    const o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = correct?"sine":"square";
    o.frequency.value = correct?660:180;
    g.gain.setValueAtTime(0.18, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+0.45);
    o.start(); o.stop(a.currentTime+0.45);
  } catch {}
}

function makeCard(ref, name, sc, tot, pct, cats, diff) {
  const cv=ref.current; if(!cv) return;
  const ctx=cv.getContext("2d");
  cv.width=800; cv.height=450;
  const bg=ctx.createLinearGradient(0,0,800,450); bg.addColorStop(0,"#050c14"); bg.addColorStop(1,"#0a1e14");
  ctx.fillStyle=bg; ctx.fillRect(0,0,800,450);
  ctx.strokeStyle=C.green; ctx.lineWidth=4; ctx.strokeRect(6,6,788,438);
  ctx.strokeStyle="rgba(168,85,247,.35)"; ctx.lineWidth=1; ctx.strokeRect(14,14,772,422);
  ctx.font="58px serif"; ctx.textAlign="center"; ctx.fillText("🌍",400,74);
  const gr=ctx.createLinearGradient(200,0,600,0); gr.addColorStop(0,C.green); gr.addColorStop(1,C.purple);
  ctx.fillStyle=gr; ctx.font="bold 11px sans-serif"; ctx.fillText("PEACE · GENDER · CLIMATE NETWORK",400,106);
  ctx.fillStyle="#fff"; ctx.font="bold 34px sans-serif"; ctx.fillText("CLIMATE TRIVIA",400,148);
  ctx.beginPath(); ctx.arc(400,250,76,0,2*Math.PI); ctx.strokeStyle=C.green; ctx.lineWidth=4; ctx.stroke();
  ctx.fillStyle=C.green; ctx.font="bold 46px sans-serif"; ctx.fillText(pct+"%",400,263);
  ctx.fillStyle="#6b7280"; ctx.font="14px sans-serif"; ctx.fillText(sc+" / "+tot,400,286);
  ctx.fillStyle=C.gold; ctx.font="bold 24px sans-serif"; ctx.fillText(name,400,344);

  Object.assign(document.createElement("a"),{href:cv.toDataURL("image/png"),download:`PGCN_Score_${name.replace(/\s+/g,"_")}.png`}).click();
}

  const [classes,   setClasses]   = useState([]);
  const [tab,       setTab]       = useState("overview");
  const [donate,    setDonate]    = useState(false);

  useEffect(()=>{ load(); },[]);

  const load = async () => {
    setLoading(true);
    try {
      const sk=await window.storage.list("session:");
      if(sk?.keys){
        const arr=[],cls=new Set();
        for(const k of sk.keys){try{const r=await window.storage.get(k);if(r?.value){const s=JSON.parse(r.value);arr.push(s);if(s.userClass) cls.add(s.userClass);}}catch{}}
        arr.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
        setSessions(arr); setClasses(Array.from(cls).sort());
      }
      if(isAdmin){
        // ── Load BOTH old (feedback:) and new (fb:) prefixes ──
        const allFb=[];
        for(const prefix of ["fb:","feedback:"]){
          try{
            const fk=await window.storage.list(prefix);
            if(fk?.keys){ for(const k of fk.keys){try{const r=await window.storage.get(k);if(r?.value) allFb.push(JSON.parse(r.value));}catch{}} }
          }catch{}
        }
        allFb.sort((a,b)=>new Date(b.ts||b.timestamp)-new Date(a.ts||a.timestamp));
        setFeedbacks(allFb);
      }
    } finally { setLoading(false); }
  };

  const resetAll = async () => {
    if(!window.confirm("Delete ALL data? This cannot be undone.")) return;
    try{
      for(const prefix of ["session:","fb:","feedback:"]){
        const k=await window.storage.list(prefix); if(k?.keys) for(const x of k.keys){try{await window.storage.delete(x);}catch{}}
      }
      setSessions([]); setFeedbacks([]); alert("All data cleared.");
    }catch{}
  };

  const exportCSV = () => {
    const rows=[["Name","Class","Gender","Age","Date","Categories","Difficulty","Questions","Score","Percentage","Time(s)"].join(","),
      ...filt.map(s=>[s.userName,s.userClass||"N/A",s.userGender||"N/A",s.userAge||"N/A",new Date(s.timestamp).toLocaleDateString(),s.categories?.join("; "),s.difficulty,s.totalQuestions,s.score,s.percentage+"%",s.totalTimeSeconds].join(","))].join("\n");
    Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([rows],{type:"text/csv"})),download:`PGCN_Analytics_${new Date().toISOString().split("T")[0]}.csv`}).click();
  };

  const filt  = fcls==="all"?sessions:sessions.filter(s=>s.userClass===fcls);
  const stats = { players:new Set(filt.map(s=>s.userId)).size, sessions:filt.length, avgSc:filt.length?Math.round(filt.reduce((a,s)=>a+s.percentage,0)/filt.length):0, avgT:filt.length?Math.round(filt.reduce((a,s)=>a+s.totalTimeSeconds,0)/filt.length):0, pass:filt.length?Math.round((filt.filter(s=>s.percentage>=70).length/filt.length)*100):0 };
  const gSt   = filt.reduce((a,s)=>{const g=s.userGender||"Unknown";a[g]=(a[g]||0)+1;return a;},{});
  const aSt   = filt.reduce((a,s)=>{const ag=s.userAge||"Unknown";a[ag]=(a[ag]||0)+1;return a;},{});
  const catPf = {};
  filt.forEach(s=>{if(s.categoryBreakdown) Object.entries(s.categoryBreakdown).forEach(([c,{correct,total}])=>{if(!catPf[c]) catPf[c]={correct:0,total:0};catPf[c].correct+=correct;catPf[c].total+=total;});});

  const GLS = (x={})=>({background:C.panel,backdropFilter:"blur(18px)",WebkitBackdropFilter:"blur(18px)",border:`1px solid ${C.border}`,borderRadius:16,...x});
  const TABS = ["overview","sessions","categories","demographics",...(isAdmin?["feedback","admin"]:[])];
  const TLAB = {overview:"Overview",sessions:"Sessions",categories:"Categories",demographics:"Demographics",feedback:"Feedback",admin:"⚠️ Admin"};

  if(loading) return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><style>{SPIN}</style><Loader2 size={40} style={{color:C.green,animation:"spin 1s linear infinite"}}/></div>;

  // responsive stats grid: 3-col on mobile, 5-col on desktop
  const statCols = mob ? "repeat(3,1fr)" : "repeat(5,1fr)";

  return (
    <div style={{minHeight:"100vh",background:C.bg,padding:16}}>
      <div style={{maxWidth:960,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24,flexWrap:"wrap",gap:10}}>
          <div>
            <h1 style={{fontSize:mob?20:26,fontWeight:900,background:`linear-gradient(135deg,${isAdmin?C.gold:C.blue},${C.purple})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>{isAdmin?"🔐 Admin Panel":t.dash}</h1>
            <p style={{color:"#6b7280",fontSize:11}}>UN-Standard M&E · PGCN v5.0{isAdmin?" · Restricted":""}</p>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button style={{background:"transparent",border:`2px solid ${C.green}`,borderRadius:10,color:C.green,fontWeight:800,fontSize:13,cursor:"pointer",padding:"8px 14px"}} onClick={()=>setDonate(true)}>💚</button>
            <button style={{background:"transparent",border:`2px solid ${C.green}`,borderRadius:10,color:C.green,fontWeight:800,fontSize:13,cursor:"pointer",padding:"8px 14px"}} onClick={onBack}>{t.back}</button>
          </div>
        </div>
        {/* Tabs — scrollable on mobile */}
        <div style={{display:"flex",gap:8,marginBottom:20,overflowX:"auto",paddingBottom:4}}>
          {TABS.map(tb=><button key={tb} onClick={()=>setTab(tb)} style={{background:tab===tb?`${tb==="admin"?C.gold:C.green}22`:"transparent",border:`2px solid ${tab===tb?tb==="admin"?C.gold:C.green:"rgba(255,255,255,.08)"}`,borderRadius:8,padding:"8px 14px",color:tab===tb?tb==="admin"?C.gold:C.green:"#6b7280",fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{TLAB[tb]}</button>)}
        </div>

        {tab==="overview"&&<>
          <div style={{display:"grid",gridTemplateColumns:statCols,gap:10,marginBottom:14}}>
            {[[t.players,stats.players,C.blue,"👥"],[t.sess,stats.sessions,C.green,"📊"],[t.avg,stats.avgSc+"%",C.gold,"🏆"],[t.avgt,stats.avgT+"s",C.purple,"⏱"],[t.prate,stats.pass+"%",C.green,"✅"]].map(([lbl,val,col,ic])=>(
              <div key={lbl} style={{...GLS(),padding:mob?"12px 8px":"16px 12px",textAlign:"center"}}><div style={{fontSize:mob?18:22,marginBottom:4}}>{ic}</div><div style={{fontSize:mob?18:24,fontWeight:900,color:col}}>{val}</div><div style={{color:"#6b7280",fontSize:mob?9:10,marginTop:4}}>{lbl}</div></div>
            ))}
          </div>
          <div style={{...GLS(),padding:22}}>
            <h2 style={{color:"#fff",fontWeight:800,fontSize:15,marginBottom:16}}>Category Performance (Aggregated)</h2>
            {Object.keys(catPf).length===0?<p style={{color:"#374151",fontSize:13}}>No data yet</p>:
              Object.entries(catPf).sort((a,b)=>(b[1].correct/b[1].total)-(a[1].correct/a[1].total)).map(([cat,{correct,total}])=>{
                const p=Math.round((correct/total)*100),{color,icon}=CAT[cat]||{color:C.green,icon:"🌍"};
                return <div key={cat} style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{color:"#9ca3af",fontSize:13}}>{icon} {cat}</span><span style={{color,fontWeight:700,fontSize:13}}>{correct}/{total} ({p}%)</span></div><div style={{background:"rgba(255,255,255,.06)",borderRadius:99,height:6}}><div style={{width:`${p}%`,height:"100%",background:color,borderRadius:99,transition:"width .8s"}}/></div></div>;
              })}
          </div>
        </>}

        {tab==="sessions"&&<div style={{...GLS(),padding:22}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
            <h2 style={{color:"#fff",fontWeight:800,fontSize:16}}>{t.sh}</h2>
            <div style={{display:"flex",gap:8}}>
              <select value={fcls} onChange={e=>setFcls(e.target.value)} style={{background:"rgba(0,0,0,.5)",color:"#fff",border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 12px",fontSize:13,outline:"none"}}>
                <option value="all">{t.allCl}</option>{classes.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
              <button style={{background:C.green,color:"#000",border:`2px solid ${C.green}`,borderRadius:10,fontWeight:800,fontSize:13,cursor:"pointer",padding:"8px 14px",display:"flex",alignItems:"center",gap:6}} onClick={exportCSV}><Download size={16}/>CSV</button>
            </div>
          </div>
          {filt.length===0?<p style={{color:"#374151",textAlign:"center",padding:32}}>{t.none}</p>:(
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>{[t.nm,t.cl,t.dt,t.sc,t.df].map(h=><th key={h} style={{textAlign:"left",padding:"8px 12px",color:"#6b7280",fontWeight:700}}>{h}</th>)}</tr></thead>
                <tbody>{filt.slice(0,30).map((s,i)=>(
                  <tr key={i} style={{borderBottom:"1px solid rgba(255,255,255,.04)"}}>
                    <td style={{padding:"10px 12px",color:"#d1d5db"}}>{s.userName}</td>
                    <td style={{padding:"10px 12px",color:"#9ca3af"}}>{s.userClass||"N/A"}</td>
                    <td style={{padding:"10px 12px",color:"#9ca3af"}}>{new Date(s.timestamp).toLocaleDateString()}</td>
                    <td style={{padding:"10px 12px",color:s.percentage>=70?C.green:s.percentage>=50?C.gold:C.red,fontWeight:700}}>{s.score}/{s.totalQuestions} ({s.percentage}%)</td>
                    <td style={{padding:"10px 12px",color:"#9ca3af",textTransform:"capitalize"}}>{s.difficulty}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          )}
        </div>}

        {tab==="categories"&&<div style={{...GLS(),padding:22}}>
          <h2 style={{color:"#fff",fontWeight:800,fontSize:16,marginBottom:20}}>Detailed Category Analytics</h2>
          {Object.keys(catPf).length===0?<p style={{color:"#374151",fontSize:13}}>No data yet</p>:
            Object.entries(catPf).map(([cat,{correct,total}])=>{
              const p=Math.round((correct/total)*100),{color,icon}=CAT[cat]||{color:C.green,icon:"🌍"};
              return <div key={cat} style={{background:"rgba(0,0,0,.3)",borderRadius:12,padding:"18px 20px",marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{color:"#fff",fontWeight:700,fontSize:15}}>{icon} {cat}</span><span style={{color,fontWeight:900,fontSize:22}}>{p}%</span></div>
                <div style={{background:"rgba(255,255,255,.06)",borderRadius:99,height:8,marginBottom:8}}><div style={{width:`${p}%`,height:"100%",background:`linear-gradient(90deg,${color},${color}88)`,borderRadius:99,transition:"width .8s"}}/></div>
                <span style={{color:"#6b7280",fontSize:12}}>{correct} correct out of {total} attempts</span>
              </div>;
            })}
        </div>}

        {tab==="demographics"&&<div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:12}}>
          {[[t.gd,gSt,C.purple],[t.ad,aSt,C.blue]].map(([title,data,col])=>(
            <div key={title} style={{...GLS(),padding:22}}>
              <h2 style={{color:"#fff",fontWeight:800,fontSize:15,marginBottom:14}}>{title}</h2>
              {Object.entries(data).length?Object.entries(data).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(
                <div key={k} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#9ca3af",fontSize:13,textTransform:"capitalize"}}>{k}</span><span style={{color:col,fontWeight:700,fontSize:13}}>{v} ({Math.round((v/filt.length)*100)}%)</span></div>
                  <div style={{background:"rgba(255,255,255,.06)",borderRadius:99,height:5}}><div style={{width:`${(v/filt.length)*100}%`,height:"100%",background:col,borderRadius:99}}/></div>
                </div>
              )):<p style={{color:"#374151",fontSize:13}}>No data yet</p>}
            </div>
          ))}
        </div>}

        {tab==="feedback"&&isAdmin&&<div style={{...GLS(),padding:22}}>
          <h2 style={{color:"#fff",fontWeight:800,fontSize:16,marginBottom:16}}>{t.fbl} ({feedbacks.length})</h2>
          {feedbacks.length===0?<p style={{color:"#374151",fontSize:13}}>{t.nofb}</p>:
            feedbacks.map((fb,i)=>(
              <div key={i} style={{background:"rgba(0,0,0,.3)",borderRadius:10,padding:"14px 18px",marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{color:C.green,fontWeight:700,fontSize:13}}>{fb.userName||"Anonymous"}</span><span style={{color:"#6b7280",fontSize:12}}>{new Date(fb.ts||fb.timestamp).toLocaleDateString()}</span></div>
                <p style={{color:"#d1d5db",fontSize:14,lineHeight:1.6}}>{fb.feedback}</p>
              </div>
            ))}
        </div>}

        {tab==="admin"&&isAdmin&&<div style={{...GLS(),padding:28,border:`2px solid ${C.gold}`}}>
          <h2 style={{color:C.gold,fontWeight:900,fontSize:18,marginBottom:6}}>⚠️ Admin Controls</h2>
          <p style={{color:"#6b7280",fontSize:13,marginBottom:24}}>Restricted access. Actions are permanent and irreversible.</p>
          <div style={{background:"rgba(0,0,0,.4)",borderRadius:12,padding:20,marginBottom:16}}>
            <h3 style={{color:"#fff",fontWeight:700,marginBottom:4}}>Platform Statistics</h3>
            <p style={{color:"#9ca3af",fontSize:13}}>Sessions: {sessions.length} · Feedback: {feedbacks.length} · Unique players: {new Set(sessions.map(s=>s.userId)).size}</p>
          </div>
          <button style={{background:"rgba(239,68,68,.15)",border:`2px solid ${C.red}`,borderRadius:10,color:C.red,fontWeight:800,fontSize:15,cursor:"pointer",padding:"14px 20px",width:"100%"}} onClick={resetAll}>{t.reset}</button>
        </div>}

        <div style={{...GLS(),padding:20,textAlign:"center",marginTop:14}}>
          <Globe2 size={24} style={{color:C.green,margin:"0 auto 8px",display:"block"}}/>
          <p style={{color:"#fff",fontWeight:700,marginBottom:4}}>Peace, Gender & Climate Network</p>
          <p style={{color:"#6b7280",fontSize:12}}>Kingdom Gwangwava · +263 71 980 2319 · pgcnglobal@gmail.com</p>
          <p style={{color:"#374151",fontSize:11,marginTop:8}}>SDGs 4,5,7,13,16,17 · v5.0 · IPCC AR7 · COP30 · UNEP EGR 2025</p>
        </div>
      </div>
      {donate&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:99,padding:16}}>
          <div style={{...GLS(),padding:36,maxWidth:420,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:12}}>💚</div>
            <h2 style={{color:C.green,fontSize:26,fontWeight:900,marginBottom:16}}>Support Climate Action</h2>
            {[["EcoCash / OneMoney","+263 71 980 2319"],["InnBucks","+263 71 980 2319"]].map(([l,n])=>(
              <div key={l} style={{background:"rgba(34,197,94,.08)",border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 20px",marginBottom:10,textAlign:"left"}}><div style={{color:"#6b7280",fontSize:12,marginBottom:4}}>{l}</div><div style={{color:C.green,fontSize:22,fontWeight:900}}>{n}</div></div>
            ))}
            <button style={{background:C.green,color:"#000",border:`2px solid ${C.green}`,borderRadius:10,fontWeight:800,fontSize:16,cursor:"pointer",padding:"12px 20px",width:"100%",marginTop:16}} onClick={()=>setDonate(false)}>Close</button>
          </div>
        </div>
      )}
    </div>
  );
}
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
